model_family: deepseek6-7b
model_path: null
LoRA:
  r: 0
  alpha: 32
  dropout: 0.05

lr: 1e-5
split: code
data_path: mbpp
batch_size: 16
gradient_accumulation_steps: 4
num_epochs: 1
forget_loss: grad_ascent

save_dir: ${model_path}/${forget_loss}_${lr}_${split}_${num_epochs}
overwrite_dir: false
weight_decay: 0.01
save_model: true
eval_while_train: false
eval_only: false
seed: 42

device: ${..device}
eval:
  model_path: ${..model_path}
  model_family: ${..model_family}
  save_dir: ${..save_dir}
  data_path: [locuslab/TOFU, locuslab/TOFU]
  split: code
  split_list:
    - retain
    - forget

  eval_task: [eval_log, eval_log_forget]
  question_key: [question, question]
  answer_key: [answer, answer]
  base_answer_key: [answer, answer]
  perturbed_answer_key: [answer, answer]

  generation:
    max_length: 500
    max_new_tokens: null

  save_generated_text: true

  ds_size: 300

  overwrite: true
  use_pretrained: false

  batch_size: 30
  retain_result: null